<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4 text-danger">❤️ Heart Disease Prediction</h2>

        <form action="/predict" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="age" class="form-control" placeholder="Age" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="sex" class="form-control" placeholder="Sex (0=Female,1=Male)" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="cp" class="form-control" placeholder="Chest Pain Type" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="trestbps" class="form-control" placeholder="Resting Blood Pressure" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="chol" class="form-control" placeholder="Cholesterol" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="fbs" class="form-control" placeholder="Fasting Blood Sugar" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="restecg" class="form-control" placeholder="Rest ECG" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="thalach" class="form-control" placeholder="Max Heart Rate" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="exang" class="form-control" placeholder="Exercise Induced Angina" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="oldpeak" class="form-control" placeholder="Oldpeak" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="slope" class="form-control" placeholder="Slope" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="ca" class="form-control" placeholder="Number of Major Vessels" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" step="any" name="thal" class="form-control" placeholder="Thal" required>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-danger px-4">Predict</button>
            </div>
        </form>

        {% if prediction_text %}
        <div class="alert alert-info text-center mt-4">
            <h4>{{ prediction_text }}</h4>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
